name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck + Custom Lint Rules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run make check
        run: make check

      - name: Install bats
        if: success() || failure()
        run: |
          # Ubuntu's apt `bats` is <1.5.0 and REJECTS modern `run` flags
          # (run -0 / run --separate-stderr), failing ~50 tests that pass on the
          # bats 1.13.0 developers run locally (homebrew). Pin the same version.
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Set up ~/.rite (replicate dev install env)
        if: success() || failure()
        run: |
          # Tests source libs via RITE_LIB_DIR=~/.rite/lib (the dev install path).
          # CI has no install step, so replicate the documented dev symlink
          # (ln -s $(pwd)/lib ~/.rite/lib) + templates so RITE_INSTALL_DIR resolves.
          # Validated locally: this clears the lib-sourcing failures (e.g. pr-detection).
          mkdir -p "$HOME/.rite"
          ln -sf "$GITHUB_WORKSPACE/lib" "$HOME/.rite/lib"
          ln -sf "$GITHUB_WORKSPACE/templates" "$HOME/.rite/templates"

      - name: Run all tests
        if: success() || failure()
        run: make test
