name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck + Custom Lint Rules (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Run BOTH OSes to completion — sharkrite must be portable across macOS
      # (BSD userland, system bash 3.2) and Linux (GNU userland, bash 5.x). A
      # failure on one must NOT cancel the other; we want both signals. macOS
      # runners are free here because the repo is public.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install shellcheck (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install shellcheck + bash (macOS)
        if: runner.os == 'macOS'
        run: |
          # bash: the runner's /usr/bin/env bash is system bash 3.2, but the dev
          # environment this job mirrors (Sarah's Mac) has homebrew bash 5 on
          # PATH — the lint tool and several bats tests use bash-4+ builtins
          # (mapfile) under `#!/usr/bin/env bash`. The bash-3.2 contract for
          # lib/ and bin/ #!/bin/bash scripts is enforced by lint rules
          # (BASH_4_BUILTIN_IN_BIN_BASH_SCRIPT), not by this job's shell.
          brew install shellcheck bash

      - name: Run make check
        run: make check

      - name: Install bats (Linux)
        if: (success() || failure()) && runner.os == 'Linux'
        run: |
          # Ubuntu's apt `bats` is <1.5.0 and REJECTS modern `run` flags
          # (run -0 / run --separate-stderr), failing ~50 tests that pass on the
          # bats 1.13.0 developers run locally (homebrew). Pin the same version.
          git clone --depth 1 --branch v1.13.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local

      - name: Install bats (macOS)
        if: (success() || failure()) && runner.os == 'macOS'
        run: brew install bats-core

      - name: Set up ~/.rite (replicate dev install env)
        if: success() || failure()
        run: |
          # Tests source libs via RITE_LIB_DIR=~/.rite/lib (the dev install path).
          # CI has no install step, so replicate the documented dev symlink
          # (ln -s $(pwd)/lib ~/.rite/lib) + templates so RITE_INSTALL_DIR resolves.
          # Validated locally: this clears the lib-sourcing failures (e.g. pr-detection).
          mkdir -p "$HOME/.rite"
          ln -sf "$GITHUB_WORKSPACE/lib" "$HOME/.rite/lib"
          ln -sf "$GITHUB_WORKSPACE/templates" "$HOME/.rite/templates"

      - name: Configure git identity (tests git init/commit)
        if: success() || failure()
        run: |
          # Many bats tests `git init` a temp repo and `git commit`; CI has no
          # global identity → "Author identity unknown" (status 128). Set a
          # throwaway identity so those setups succeed (mirrors the dev env).
          git config --global user.email "ci@sharkrite.test"
          git config --global user.name "Sharkrite CI"

      - name: Run all tests
        if: success() || failure()
        run: make test
